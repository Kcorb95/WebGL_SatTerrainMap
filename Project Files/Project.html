<!doctype html>
<html>
<head>
    <title>WebGL Terrain Height Map</title>
    <meta charset="utf-8" />
    <style type="text/css">
        canvas {
            background: #000;
        }
    </style>
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition; // vert attribs bound to array buffer data
        attribute vec3 vNormal;
        uniform vec4 color; // uniform value shared across all vertices
        uniform vec4 color2; // uniform value shared across all vertices
        varying vec4 vColor; // sent down to later stages of the pipeline
        varying float normZ;
        uniform mat4 projectionMatrix; // uniform matrix for viewing projection
        uniform mat4 modelViewMatrix;
        uniform float hmax;
        uniform float hmin;
        uniform vec4 lightPosition;
        uniform vec4 lightDiffuse;

        void main()
        {
            vec3 pos = -(modelViewMatrix * vPosition).xyz;

            //fixed light position

            vec3 light = lightPosition.xyz;
            vec3 L = normalize( light - pos );


            vec3 E = normalize( -pos );
            vec3 H = normalize( L + E );

            vec4 NN = vec4(vNormal,0);

            // Transform vertex normal into eye coordinates

            vec3 N = normalize( (modelViewMatrix*NN).xyz);

            //Normalize Heights
            normZ = (vPosition.z - hmin) / (hmax - hmin);

            //mix height with two colors for the blended colors
            vColor = mix(color, color2, normZ);

            vec4 diffuseProduct = vColor * lightDiffuse;

            float Kd = max( dot(L, N), 0.0 );
            vec4  diffuse = Kd*diffuseProduct;
        
            gl_Position = projectionMatrix * modelViewMatrix * vPosition;
        }
    </script>
    <script id="fragment-shader" type="x-shader/x-fragment">
        #ifdef GL_ES
        precision highp float;
        #endif

        varying vec4 vColor;

        void
        main()
        {
            gl_FragColor = vColor;
        }
    </script>
    <script type="text/javascript" src="../Common/webgl-utils.js"></script>
    <script type="text/javascript" src="../Common/initShaders.js"></script>
    <script type="text/javascript" src="../Common/MV.js"></script>
    <script type="text/javascript" src="Project.js"></script>
    <script type="text/javascript" src="../lib/ReadDEM.js"></script>

</head>
<body style="background-color:black;text-align:center;">
<p id="cellName">
    <b>
        <font color="white">Please choose a terrain file</font>
    </b>
</p>
<br />

<canvas id="gl-canvas" width="800" height="800">

<input type="file" id="files" name="file" accept=".dem" />
<script>
    function handleFileSelect() {
        var files = document.getElementById('files').files;
        if (!files.length) {
            alert('Please select a file!');
            return;
        }
        readDemFile(files[0], buildTerrain);
    }
    document.getElementById('files').addEventListener('change', handleFileSelect);

</script>

<input id="heightSlider" type="range" min="1" max="10" step="1" value="2">

<br />

<input id="blueIn2" type="text" placeholder="How much blue (0-1)?" />

</body>
</html>
