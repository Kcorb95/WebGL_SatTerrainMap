<!doctype html>
<html>
<head>
    <title>WebGL Triangle Strip Grid</title>
    <meta charset="utf-8" />
    <style type="text/css">
        canvas {
            background: #000;
        }
    </style>
    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition; // vert attribs bound to array buffer data
        uniform vec4 color; // uniform value shared across all vertices
        varying vec4 vColor; // sent down to later stages of the pipeline
        uniform mat4 proj; // uniform matrix for viewing projection

        void main()
        {
        // blend the app-defined color with the "height" coordinate
        vColor = vec4( color.r * vPosition.z,
                        color.g * vPosition.z,
                        color.b * vPosition.z,
                        color.a );

        // some per-object matrix ops now done at app level
        // but final matrix chain is processed here
        gl_Position = proj * vPosition;
        }
    </script>
    <script id="fragment-shader" type="x-shader/x-fragment">
        #ifdef GL_ES
        precision highp float;
        #endif

        varying vec4 vColor;

        void
        main()
        {
            gl_FragColor = vColor;
        }
    </script>
    <script type="text/javascript" src="../Common/webgl-utils.js"></script>
    <script type="text/javascript" src="../Common/initShaders.js"></script>
    <script type="text/javascript" src="../Common/MV.js"></script>
    <script type="text/javascript" src="Project2.js"></script>
</head>
<body style="background-color:black;text-align:center;">
    <canvas id="gl-canvas" width="720" height="720">
        Oops ...
        your browser doesn't support the HTML5 canvas element
    </canvas>
    <br />
    <br />
    <input id="redIn" type="text" placeholder="How much red(0-1)?" />
    <input id="greenIn" type="text" placeholder="How much green (0-1)?" />
    <input id="blueIn" type="text" placeholder="How much blue (0-1)?" />
    <button id="colorBtn">Set Primary Color</button>
    <br />
    <br />
    <input id="redIn2" type="text" placeholder="How much red(0-1)?" />
    <input id="greenIn2" type="text" placeholder="How much green (0-1)?" />
    <input id="blueIn2" type="text" placeholder="How much blue (0-1)?" />
    <button id="colorBtn2">Set Secondary Color</button>
</body>
</html>
