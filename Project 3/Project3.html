    <script id="vertex-shader" type="x-shader/x-vertex">
        attribute vec4 vPosition; // vert attribs bound to array buffer data
        uniform vec4 color; // uniform value shared across all vertices
        uniform vec4 color2; // uniform value shared across all vertices
        varying vec4 vColor; // sent down to later stages of the pipeline
        uniform mat4 projectionMatrix; // uniform matrix for viewing projection
        uniform mat4 modelViewMatrix;
        uniform float hmax;
        uniform float hmin;
        varying float normZ;

        void main()
        {
        //Normalize Heights
        normZ = (vPosition.z - hmin) / (hmax - hmin);

        //mix height with two colors for the blended colors
        vColor = mix(color, color2, normZ);
        
        gl_Position = projectionMatrix * modelViewMatrix * vPosition;
        }
    </script>
    <script id="fragment-shader" type="x-shader/x-fragment">
        #ifdef GL_ES
        precision highp float;
        #endif

        varying vec4 vColor;

        void
        main()
        {
            gl_FragColor = vColor;
        }
    </script>
